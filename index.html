<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>你属于哪座城市？</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- 背景装饰 -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>

  <!-- 首页 -->
  <section id="page-intro" class="page page--active">
    <div class="intro-content">
      <p class="intro-eyebrow">一场关于灵魂居所的探索</p>
      <h1 class="intro-title">
        <span class="title-line">你真正</span>
        <span class="title-line title-line--italic">属于</span>
        <span class="title-line">哪座城市？</span>
      </h1>
      <p class="intro-desc">
        世界那么大，总有一座城市，与你的气质、节奏、欲望完全契合。<br />
        28道沉浸式问题，带你找到那个真正意义上的"家"。
      </p>
      <div class="intro-meta">
        <span>🌍 覆盖全球 20 座城市</span>
        <span>·</span>
        <span>⏱ 约 5 分钟</span>
      </div>
      <button class="btn-start" id="btn-start">开始探索</button>
    </div>
    <div class="intro-deco">
      <div class="deco-circle"></div>
      <div class="deco-dot-grid"></div>
    </div>
  </section>

  <!-- 测试页 -->
  <section id="page-quiz" class="page">
    <div class="quiz-header">
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" id="progress-fill"></div>
        </div>
        <span class="quiz-progress-text" id="progress-text">1 / 28</span>
      </div>
    </div>

    <div class="quiz-body">
      <div class="question-tag" id="question-tag">场景一</div>
      <h2 class="question-text" id="question-text"></h2>
      <div class="options-grid" id="options-grid"></div>
    </div>

    <div class="quiz-nav">
      <button class="btn-back" id="btn-back">← 返回</button>
    </div>
  </section>

  <!-- 结果页 -->
  <section id="page-result" class="page">
    <div class="result-inner">
      <p class="result-eyebrow">你的灵魂城市是</p>
      <h2 class="result-city-name" id="result-city-name"></h2>
      <p class="result-city-country" id="result-city-country"></p>
      <div class="result-divider"></div>
      <p class="result-tagline" id="result-tagline"></p>
      <p class="result-desc" id="result-desc"></p>

      <div class="result-traits" id="result-traits"></div>

      <div class="result-actions">
        <button class="btn-restart" id="btn-restart">重新探索</button>
        <button class="btn-share" id="btn-share">分享结果</button>
      </div>

      <div class="result-other-label">你可能也适合</div>
      <div class="result-other-cities" id="result-other-cities"></div>
    </div>
  </section>

  <!-- 分享提示 -->
  <div class="toast" id="toast">已复制到剪贴板 ✓</div>

  <script src="js/questions.js"></script>
  <script src="js/cities.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
